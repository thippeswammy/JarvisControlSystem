# ============================================================
# Jarvis v2 — Master Configuration
# ============================================================

jarvis:
  input_mode: text                   # text | voice | api
  voice_confidence_threshold: 0.70   # below this → ask to confirm

# ── LLM Router ──────────────────────────────────────────────
llm:
  primary: local                     # try Ollama first
  fallback: tunneled                 # if Ollama is down
  emergency_fallback: mock           # always works

  backends:
    local:
      engine: ollama
      api_url: "http://localhost:11434/v1"
      model: "gemma3:4b"
      fallback_model: "gemma3:4b"   # stable for 4GB VRAM
      max_tokens: 300
      temperature: 0.1
      timeout_seconds: 15
      auto_pull: true

    # Cloud: OpenAI or Anthropic
    openai:
      provider: openai
      api_key: "${OPENAI_API_KEY}"
      model: gpt-4o-mini
      max_tokens: 300
      temperature: 0.1
      timeout_seconds: 20

    # Tunneled: self-hosted model via ngrok / cloudflared / bore.pub
    tunneled:
      api_url: "${JARVIS_TUNNEL_URL}"
      api_key: "${JARVIS_TUNNEL_KEY}"
      model: "${JARVIS_TUNNEL_MODEL}"
      timeout_seconds: 10

    mock:
      enabled: true

# ── Channels ────────────────────────────────────────────────
channels:
  cli:
    enabled: true
  
  telegram:
    enabled: true
    token: "8693706700:AAERwET5RcROo91AbQ9K2-yv1DPx_VwhH40"
    allowed_chat_ids: []               # empty = all

  telegram_test:
    enabled: false
  
  voice:
    enabled: false

# ── Memory ──────────────────────────────────────────────────
memory:
  root_dir: ./memory
  db_path: ./memory/jarvis_v2.db
  episodic_per_channel: true          # isolate episodic memory per channel
  confidence_decay_per_fail: 0.05
  confidence_boost_per_success: 0.02
  min_confidence_threshold: 0.30
