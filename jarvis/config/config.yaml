# ============================================================
# Jarvis v2 — Master Configuration
# ============================================================

jarvis:
  input_mode: text                   # text | voice | api
  voice_confidence_threshold: 0.70   # below this → ask to confirm

# ── LLM Router ──────────────────────────────────────────────
llm:
  primary: local                     # Local Ollama primary
  fallback: tunneled                   # Tunneled ngrok fallback
  emergency_fallback: mock           # always works

  backends:
    local:
      engine: ollama
      api_url: "http://localhost:11434/v1"
      model: "gemma3:4b"
      fallback_model: "gemma3:4b"   # stable for 4GB VRAM
      max_tokens: 300
      temperature: 0.1
      timeout_seconds: 45
      auto_pull: true

    # Cloud: OpenAI or Anthropic
    openai:
      provider: openai
      api_key: "${OPENAI_API_KEY}"
      model: gpt-4o-mini
      max_tokens: 300
      temperature: 0.1
      timeout_seconds: 20

    # Cloud: NVIDIA NIM (OpenAI-compatible)
    nvidia:
      model: "qwen/qwen3-coder-480b-a35b-instruct"
      api_key: "${NVIDIA_API_KEY}"
      base_url: "https://integrate.api.nvidia.com/v1"
      max_tokens: 4096
      temperature: 0.7
      top_p: 0.8
      timeout_seconds: 30

    # Tunneled: self-hosted model via ngrok / cloudflared / bore.pub
    tunneled:
      api_url: "https://petri-crowbar-occupier.ngrok-free.dev/v1"
      api_key: ""
      model: "gemma4:e2b"
      max_tokens: 131072
      temperature: 0.6
      timeout_seconds: 45

    mock:
      enabled: true

# ── Channels ────────────────────────────────────────────────
channels:
  cli:
    enabled: true
  
  telegram:
    enabled: true
    token: "8693706700:AAERwET5RcROo91AbQ9K2-yv1DPx_VwhH40"
    allowed_chat_ids: []               # empty = all

  telegram_test:
    enabled: false
  
  voice:
    enabled: false

# ── Memory ──────────────────────────────────────────────────
memory:
  root_dir: ./memory
  db_path: ./memory/jarvis_v2.db
  episodic_per_channel: true          # isolate episodic memory per channel
  confidence_decay_per_fail: 0.05
  confidence_boost_per_success: 0.02
  min_confidence_threshold: 0.30
